services:
  dexa-api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - '4015-4016:4015'
    volumes:
      - ./app-data:/app/data
      - ./logs:/app/logs
    restart: always
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
      POSTGRES_DB: ${DB_NAME:-dexa_db}
    ports:
      - '5432:5432'
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5