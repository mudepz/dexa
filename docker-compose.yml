services:
  dexa-api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - '4015:4015'
    volumes:
      - ./app-data:/app/data
      - ./logs:/app/logs
    restart: always
    depends_on:
      dexa-db:
        condition: service_healthy
      dexa-minio:
        condition: service_healthy
  dexa-db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
      POSTGRES_DB: ${DB_NAME:-dexa_db}
    ports:
      - '5433:5432'
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
  dexa-minio:
    image: minio/minio:latest
    container_name: dexa-minio
    restart: always
    ports:
      - '9100:9000'
      - '9101:9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-miniopassword}
      MINIO_REGION_NAME: ${MINIO_REGION:-ap-southeast-1}
    volumes:
      - ./minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
  createbuckets:
    image: minio/mc
    depends_on:
      dexa-minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " /usr/bin/mc alias set myminio http://dexa-minio:9000 ${MINIO_USER} ${MINIO_PASSWORD}; /usr/bin/mc mb myminio/${MINIO_BUCKET_NAME:-dexa} || true; exit 0; "
  dexa-redis:
    image: redis:7-alpine
    container_name: dexa-redis
    ports:
      - '6379:6379'
    volumes:
      - ./redis-data:/data
    restart: always
    command: [ 'redis-server', '--requirepass', '${REDIS_PASSWORD}' ]
    env_file: .env
